name: Release @storykit/core

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @storykit/core test --run

      - name: Build package
        run: pnpm --filter @storykit/core build

      - name: Bump version and create git tag
        id: bump
        run: |
          cd packages/native

          # Определяем текущую версию
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Определяем новую версию
          case "${{ github.event.inputs.version_type }}" in
            patch)
              NEW_VERSION=$(node -e "const semver = require('semver'); console.log(semver.inc('$CURRENT_VERSION', 'patch'))")
              ;;
            minor)
              NEW_VERSION=$(node -e "const semver = require('semver'); console.log(semver.inc('$CURRENT_VERSION', 'minor'))")
              ;;
            major)
              NEW_VERSION=$(node -e "const semver = require('semver'); console.log(semver.inc('$CURRENT_VERSION', 'major'))")
              ;;
            prerelease)
              NEW_VERSION=$(node -e "const semver = require('semver'); console.log(semver.inc('$CURRENT_VERSION', 'prerelease', 'beta'))")
              ;;
          esac

          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Обновляем package.json
          npm version $NEW_VERSION --no-git-tag-version

          # Коммитим изменения
          git add package.json
          git commit -m "chore: bump @storykit/core to v$NEW_VERSION"

          # Создаем git tag
          git tag "@storykit/core@$NEW_VERSION"

      - name: Push changes and tag
        run: |
          git push origin HEAD
          git push origin "@storykit/core@${{ steps.bump.outputs.new_version }}"

      - name: Publish to NPM
        run: pnpm --filter @storykit/core publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "@storykit/core@${{ steps.bump.outputs.new_version }}"
          release_name: "@storykit/core v${{ steps.bump.outputs.new_version }}"
          body: |
            ## Changes in @storykit/core v${{ steps.bump.outputs.new_version }}

            ### 🚀 Features
            - New features and improvements

            ### 🐛 Bug Fixes
            - Bug fixes and patches

            ### 📚 Documentation
            - Documentation updates

            ### 🔧 Maintenance
            - Code quality improvements
            - Dependency updates

            ---
            Published to [npm](https://www.npmjs.com/package/@storykit/core)
          draft: false
          prerelease: ${{ contains(github.event.inputs.version_type, 'prerelease') }}