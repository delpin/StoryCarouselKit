<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Carousel Example</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;

      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);

  <h1>Story Carousel Example</h1>
  <div class="container">
    <div id="story-carousel" style="width: 100%; height: 600px;"></div>
  </div>

  <script type="module">
    // This is a conceptual example - in real usage you'd import from the built packages
    // import { StoryCarousel } from '@story-carousel/native';

    const stories = [
      { id: '1', content: 'Story 1', duration: 3000 },
      { id: '2', content: 'Story 2', duration: 4000 },
      { id: '3', content: 'Story 3', duration: 5000 },
    ];

    // Example usage of native package
    console.log('Stories:', stories);
    console.log('This example shows the basic structure. Build the packages and use them in your framework of choice.');
